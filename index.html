<style>
  :root{
    --ink:#14110E; --surface:#1E1A16; --surface2:#28231E; --line:#3A332C;
    --line2:#4A4137;
    --paper:#F4EFE7; --muted:#A89A86; --muted2:#6F6557;
    --gold:#C8A24A; --gold-2:#D8B662; --gold-soft:rgba(200,162,74,.13);
    --gold-glow:rgba(200,162,74,.22);
    --ingreso:#7FB58A; --gasto:#D58D70; --neto:#6FA4D8;
    --ingreso-soft:rgba(127,181,138,.13); --gasto-soft:rgba(213,141,112,.13);
    --radius:16px;
    --shadow-sm:0 1px 2px rgba(0,0,0,.25);
    --shadow:0 4px 16px -4px rgba(0,0,0,.4);
    --shadow-lg:0 12px 34px -8px rgba(0,0,0,.55);
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--ink);color:var(--paper);font-family:'Hanken Grotesk',-apple-system,sans-serif;font-size:16px;line-height:1.45;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{padding-bottom:96px;min-height:100vh;-webkit-text-size-adjust:100%;background-image:radial-gradient(120% 80% at 50% -10%, #1a1612 0%, var(--ink) 46%)}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-.015em}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;transition:background .18s var(--ease),color .18s var(--ease),border-color .18s var(--ease),transform .12s var(--ease),box-shadow .18s var(--ease)}
  button:active{transform:scale(.97)}
  input,select,textarea{font-family:inherit;font-size:16px;width:100%;transition:border-color .18s var(--ease),box-shadow .18s var(--ease),background .18s var(--ease)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold) !important;box-shadow:0 0 0 3px var(--gold-soft)}

  header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--ink) 62%,rgba(20,17,14,.86) 88%,transparent);backdrop-filter:blur(6px);padding:max(14px,env(safe-area-inset-top)) 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid transparent}

  /* FAB */
  .fab{position:fixed;right:18px;bottom:max(86px,calc(env(safe-area-inset-bottom) + 78px));z-index:30;width:58px;height:58px;border-radius:50%;background:linear-gradient(145deg,var(--gold-2),var(--gold));color:var(--ink);font-size:30px;display:grid;place-items:center;box-shadow:0 8px 24px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.08) inset;font-weight:300}

function logoSVG(fill,h){var w=Math.round(h*677/727);return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 677 727" aria-label="MH Finance" style="display:block"><g transform="translate(0,727) scale(0.1,-0.1)" fill="'+fill+'">'+LOGO_PATH+'</g></svg>';}


/* ---------- Categorías ---------- */
const CATS = {
  ingreso:['Comisión por venta de propiedad','Comisión por alquiler de propiedad','Comisión por referido'],
  gasto:['Pago de comisiones por ventas','Pago de comisiones por alquileres','Pago de comisiones por referidos','Otros gastos de negocio']
};

/* ---------- Utilidades ---------- */
const fmtCRC = n => new Intl.NumberFormat('es-CR',{style:'currency',currency:'CRC',maximumFractionDigits:0}).format(Math.round(n));
const fmtUSD = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:2}).format(n);
function fmtC(n){const s=n<0?'−':'';n=Math.abs(n);if(n>=1e6)return s+'₡'+(n/1e6).toFixed(n>=1e7?0:1)+'M';if(n>=1e3)return s+'₡'+Math.round(n/1e3)+'k';return s+'₡'+Math.round(n);}
const MES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Set','Oct','Nov','Dic'];
const crc = m => m.moneda==='USD' ? m.monto*m.tc : m.monto;          // valor en colones
const mkey = f => f.slice(0,7);                                       // "YYYY-MM"
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1800);}

/* ---------- Estado de filtro de período ---------- */
function thisMonth(){const d=new Date();return d.toISOString().slice(0,7);}
let PER = { desde: new Date().getFullYear()+'-01', hasta: thisMonth(), preset:'año' };

function inRange(m, desde, hasta){const k=mkey(m.fecha); return k>=desde && k<=hasta;}
function sum(list){let i=0,g=0; list.forEach(m=>{ if(m.tipo==='ingreso') i+=crc(m); else g+=crc(m); }); return {i,g,n:i-g};}
function prevYear(p){const f=s=>{const[y,m]=s.split('-');return (parseInt(y)-1)+'-'+m;}; return {desde:f(p.desde),hasta:f(p.hasta)};}

/* ---------- Navegación ---------- */
let CURRENT='resumen';
function go(v){CURRENT=v;['resumen','graficos','movimientos','reportes','ajustes'].forEach(x=>document.getElementById('nav-'+x).classList.toggle('active',x===v));render();}

function render(){
  if(CURRENT==='resumen') renderResumen();
  else if(CURRENT==='graficos') renderGraficos();
  else if(CURRENT==='movimientos') renderMovs();
  else if(CURRENT==='reportes') renderReportes();
  else renderAjustes();
}

/* ---------- Vista RESUMEN ---------- */
function setPreset(p){
  const now=new Date(), y=now.getFullYear(), m=thisMonth();
  if(p==='mes'){PER={desde:m,hasta:m,preset:'mes'};}
  else if(p==='mesPasado'){const d=new Date(y,now.getMonth()-1,1).toISOString().slice(0,7);PER={desde:d,hasta:d,preset:'mesPasado'};}
  else if(p==='año'){PER={desde:y+'-01',hasta:m,preset:'año'};}
  else if(p==='añoPasado'){PER={desde:(y-1)+'-01',hasta:(y-1)+'-12',preset:'añoPasado'};}
  else if(p==='12m'){const d=new Date(y,now.getMonth()-11,1).toISOString().slice(0,7);PER={desde:d,hasta:m,preset:'12m'};}
  render();
}
function setDesde(v){PER.desde=v;PER.preset='';render();}
function setHasta(v){PER.hasta=v;PER.preset='';render();}

function periodBarHTML(){return `
  <div class="periodbar">
    <div class="lbl">Período</div>
    <div class="rangewrap">
      <div class="field"><span>Desde</span><input type="month" value="${PER.desde}" onchange="setDesde(this.value)"></div>
      <div class="dash">—</div>
      <div class="field"><span>Hasta</span><input type="month" value="${PER.hasta}" onchange="setHasta(this.value)"></div>
    </div>
    <div class="presets">
      ${[['mes','Este mes'],['mesPasado','Mes pasado'],['año','Este año'],['añoPasado','Año pasado'],['12m','Últ. 12 meses']]
        .map(([k,l])=>`<button class="${PER.preset===k?'active':''}" onclick="setPreset('${k}')">${l}</button>`).join('')}
    </div>
  </div>`;}

function renderResumen(){
  const cur = DATA.filter(m=>inRange(m,PER.desde,PER.hasta));
  const s = sum(cur);
  const nIng = cur.filter(m=>m.tipo==='ingreso').length, nGas = cur.length-nIng;
  const pv = prevYear(PER);
  const prev = sum(DATA.filter(m=>inRange(m,pv.desde,pv.hasta)));

  const pct=(a,b)=> b===0 ? (a>0?100:0) : Math.round(((a-b)/Math.abs(b))*100);
  const yoyTxt=(a,b,inv)=>{ if(b===0&&a===0) return '<span class="yoy">Sin datos comparables</span>';
    const p=pct(a,b); const good = inv ? p<0 : p>0;
    const cls = p===0?'':(good?'up':'down'); const arr=p>0?'▲':(p<0?'▼':'—');
    return `<div class="yoy">vs. ${labelPrev()}: <b class="${cls}">${arr} ${Math.abs(p)}%</b> · ${fmtCRC(b)}</div>`; };

  // breakdown
  const brk = (tipo,color)=>{const g={}; cur.filter(m=>m.tipo===tipo).forEach(m=>{g[m.categoria]=(g[m.categoria]||0)+crc(m);});
    const keys=Object.keys(g).sort((a,b)=>g[b]-g[a]);
    if(!keys.length) return `<div class="brk"><span class="name" style="color:var(--muted2)">Sin movimientos</span></div>`;
    return keys.map(k=>`<div class="brk"><span class="name"><span class="dot" style="background:${color}"></span>${k}</span><span class="amt" style="color:${color}">${fmtCRC(g[k])}</span></div>`).join('');};

  document.getElementById('view').innerHTML = `
  ${periodBarHTML()}

  <div class="cards">
    <div class="card"><div class="k"><span class="dot" style="background:var(--ingreso)"></span>Ingresos</div><div class="v ingreso num">${fmtCRC(s.i)}</div>${yoyTxt(s.i,prev.i,false)}</div>
    <div class="card"><div class="k"><span class="dot" style="background:var(--gasto)"></span>Gastos</div><div class="v gasto num">${fmtCRC(s.g)}</div>${yoyTxt(s.g,prev.g,true)}</div>
    <div class="card net"><div class="k">Saldo del período</div><div class="v neto num">${fmtCRC(s.n)}</div>${yoyTxt(s.n,prev.n,false)}</div>
  </div>

  <div class="statstrip">
    <div class="stat"><div class="sv num">${cur.length}</div><div class="sk">Operaciones</div></div>
    <div class="stat"><div class="sv num" style="color:var(--ingreso)">${nIng}</div><div class="sk">Ingresos</div></div>
    <div class="stat"><div class="sv num" style="color:var(--gasto)">${nGas}</div><div class="sk">Gastos</div></div>
  </div>

  <div class="section">
    <h3>Ingresos · Gastos · Saldo <span class="small">por mes</span></h3>
    <div class="legend"><span><i style="background:var(--ingreso)"></i>Ingresos</span><span><i style="background:var(--gasto)"></i>Gastos</span><span><i style="background:var(--neto)"></i>Saldo</span></div>
    ${renderChart(cur)}
  </div>

  <div class="twocols">
    <div class="section">
      <h3>Ingresos por categoría</h3>
      ${brk('ingreso','var(--ingreso)')}
    </div>
    <div class="section">
      <h3>Gastos por categoría</h3>
      ${brk('gasto','var(--gasto)')}
    </div>
  </div>`;
}

function labelPrev(){
  if(PER.preset==='mes'||PER.preset==='mesPasado'){const[y,m]=PER.desde.split('-');return MES[+m-1]+' '+(y-1);}
  if(PER.preset==='año'||PER.preset==='añoPasado'){return (PER.desde.split('-')[0]-1)+'';}
  return 'año anterior';
}

function renderChart(cur){
  // agrupar por mes en el rango
  const months=[]; let d=PER.desde;
  let guard=0;
  while(d<=PER.hasta && guard<60){months.push(d); let[y,m]=d.split('-').map(Number); m++; if(m>12){m=1;y++;} d=y+'-'+String(m).padStart(2,'0'); guard++;}
  const map={}; months.forEach(k=>map[k]={i:0,g:0});
  cur.forEach(m=>{const k=mkey(m.fecha); if(map[k]){ if(m.tipo==='ingreso')map[k].i+=crc(m); else map[k].g+=crc(m);} });
  const max=Math.max(1,...months.map(k=>Math.max(map[k].i,map[k].g)));
  if(!cur.length) return `<div class="brk"><span class="name" style="color:var(--muted2)">Sin movimientos en el período</span></div>`;
  return `<div class="chart">${months.map(k=>{
    const[y,mm]=k.split('-'); const hi=Math.round(map[k].i/max*84), hg=Math.round(map[k].g/max*84);
    const saldo=map[k].i-map[k].g; const sc= saldo>0?'var(--neto)':(saldo<0?'var(--gasto)':'var(--muted2)');
    return `<div class="bargroup"><div class="bars"><div class="bar i" style="height:${hi}px"></div><div class="bar g" style="height:${hg}px"></div></div><span class="mlabel">${MES[+mm-1]}${months.length>12?"'"+String(y).slice(2):''}</span><span class="saldolbl" style="color:${sc}">${fmtC(saldo)}</span></div>`;
  }).join('')}</div>`;
}

/* ---------- Vista GRÁFICOS ---------- */
let GMETRIC='saldo';
function setGMetric(m){GMETRIC=m;render();}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function monthsInRange(desde,hasta){const a=[];let d=desde,g=0;while(d<=hasta&&g<60){a.push(d);let[y,m]=d.split('-').map(Number);m++;if(m>12){m=1;y++;}d=y+'-'+String(m).padStart(2,'0');g++;}return a;}

function renderGraficos(){
  const months=monthsInRange(PER.desde,PER.hasta);
  const map={}; DATA.forEach(m=>{const k=mkey(m.fecha); if(!map[k])map[k]={i:0,g:0}; if(m.tipo==='ingreso')map[k].i+=crc(m); else map[k].g+=crc(m);});
  const mv=k=>{const o=map[k]||{i:0,g:0}; return GMETRIC==='ingresos'?o.i:GMETRIC==='gastos'?o.g:o.i-o.g;};
  const shift=(k,o)=>{const[y,m]=k.split('-');return (parseInt(y)+o)+'-'+m;};
  const cur=months.map(mv), prev=months.map(k=>mv(shift(k,-1)));
  const totCur=cur.reduce((a,b)=>a+b,0), totPrev=prev.reduce((a,b)=>a+b,0);
  const col=GMETRIC==='ingresos'?'#7FB58A':GMETRIC==='gastos'?'#D58D70':'#4F8FCC';
  const yEnd=parseInt(PER.hasta.split('-')[0]);
  const pct= totPrev===0?(totCur!==0?(totCur>0?100:-100):0):Math.round((totCur-totPrev)/Math.abs(totPrev)*100);
  const good= GMETRIC==='gastos'? pct<0 : pct>0; const arr=pct>0?'\u25B2':pct<0?'\u25BC':'\u2014';
  const hasData=DATA.length>0;
  document.getElementById('view').innerHTML = periodBarHTML() + `
   <div class="gtoggle">
     ${[['saldo','Saldo'],['ingresos','Ingresos'],['gastos','Gastos']].map(([k,l])=>`<button class="${GMETRIC===k?'on':''}" onclick="setGMetric('${k}')">${l}</button>`).join('')}
   </div>
   <div class="section">
     <h3>${cap(GMETRIC)} por mes <span class="small">${yEnd} vs ${yEnd-1}</span></h3>
     ${hasData?svgLineChart(months,cur,prev,col):'<div class="brk"><span class="name" style="color:var(--muted2)">A\u00fan no hay movimientos registrados</span></div>'}
     <div class="glegend">
       <span><i class="solid" style="background:${col}"></i>Per\u00edodo actual (${yEnd})</span>
       <span><i class="dash"></i>A\u00f1o anterior (${yEnd-1})</span>
     </div>
   </div>
   <div class="section">
     <h3>Comparaci\u00f3n del per\u00edodo</h3>
     <div class="cmp">
       <div><div class="cmpk">Actual</div><div class="cmpv num" style="color:${col}">${fmtCRC(totCur)}</div></div>
       <div><div class="cmpk">A\u00f1o anterior</div><div class="cmpv num" style="color:var(--muted)">${fmtCRC(totPrev)}</div></div>
       <div><div class="cmpk">Variaci\u00f3n</div><div class="cmpv num ${pct===0?'':good?'up':'down'}">${arr} ${Math.abs(pct)}%</div></div>
     </div>
   </div>`;
}

function svgLineChart(months,cur,prev,col){
  const W=1000,H=380,pL=14,pR=14,pT=26,pB=40, n=months.length;
  const all=cur.concat(prev).concat([0]);
  let max=Math.max(...all),min=Math.min(...all); if(max===min){max+=1;min-=1;}
  const padv=(max-min)*0.12; max+=padv; min-=padv;
  const X=i=> n<=1? W/2 : pL+i*(W-pL-pR)/(n-1);
  const Y=v=> pT+(max-v)/(max-min)*(H-pT-pB);
  const pts=a=>a.map((v,i)=>X(i)+','+Y(v)).join(' ');
  const z=Y(0);
  const area=`M ${X(0)},${z} `+cur.map((v,i)=>`L ${X(i)},${Y(v)}`).join(' ')+` L ${X(n-1)},${z} Z`;
  const dots=cur.map((v,i)=>`<circle cx="${X(i)}" cy="${Y(v)}" r="5" fill="${col}"/>`).join('');
  const labels= n<=8? cur.map((v,i)=>`<text x="${X(i)}" y="${Y(v)-14}" fill="${col}" font-size="23" text-anchor="middle" font-weight="600">${fmtC(v)}</text>`).join(''):'';
  const step= n<=12?1:Math.ceil(n/12);
  const xlab=months.map((k,i)=> i%step===0?`<text x="${X(i)}" y="${H-12}" fill="#8a7d6b" font-size="21" text-anchor="middle">${MES[+k.split('-')[1]-1]}${n>12?"\u2019"+k.slice(2,4):''}</text>`:'').join('');
  const zline=(min<0&&max>0)?`<line x1="${pL}" y1="${z}" x2="${W-pR}" y2="${z}" stroke="#3A332C" stroke-width="1.5" stroke-dasharray="5 5"/>`:'';

}

/* ---------- Vista MOVIMIENTOS ---------- */
let MFILTER='todos', MSEARCH='', MDESDE='', MHASTA='', MSORT='fecha';
function setMFilter(f){MFILTER=f;render();}
function setMSearch(v){MSEARCH=v.toLowerCase();renderMovs(true);}
function setMDesde(v){MDESDE=v;render();}
function setMHasta(v){MHASTA=v;render();}
function clearMPeriod(){MDESDE='';MHASTA='';render();}
function setMSort(s){MSORT=s;render();}

function renderMovs(keepFocus){
  // Base: solo filtro de período (para los conteos por tipo)
  const base=DATA.filter(m=>(!MDESDE||mkey(m.fecha)>=MDESDE)&&(!MHASTA||mkey(m.fecha)<=MHASTA));
  const cTodos=base.length, cIng=base.filter(m=>m.tipo==='ingreso').length, cGas=cTodos-cIng;

  let list=[...base];
  if(MFILTER!=='todos') list=list.filter(m=>m.tipo===MFILTER);
  if(MSEARCH) list=list.filter(m=>((m.propiedad||'')+' '+(m.detalle||'')+' '+m.categoria).toLowerCase().includes(MSEARCH));
  if(MSORT==='monto') list.sort((a,b)=> crc(b)-crc(a) || b.fecha.localeCompare(a.fecha));
  else list.sort((a,b)=> b.fecha.localeCompare(a.fecha) || b.id-a.id);

  // Totales del listado filtrado
  const fIng=list.filter(m=>m.tipo==='ingreso').reduce((a,m)=>a+crc(m),0);
  const fGas=list.filter(m=>m.tipo==='gasto').reduce((a,m)=>a+crc(m),0);
  let resTxt;
  if(MFILTER==='ingreso') resTxt=`<b>${list.length}</b> ingreso${list.length===1?'':'s'} · <b>${fmtCRC(fIng)}</b>`;
  else if(MFILTER==='gasto') resTxt=`<b>${list.length}</b> gasto${list.length===1?'':'s'} · <b>${fmtCRC(fGas)}</b>`;
  else resTxt=`<b>${list.length}</b> movimiento${list.length===1?'':'s'} · Neto <b>${fmtCRC(fIng-fGas)}</b>`;

  const emptyMsg = base.length
    ? `<div class="empty"><div class="big">⌕</div>No hay resultados con estos filtros.<br>Probá ajustar el período, el tipo o la búsqueda.</div>`
    : `<div class="empty"><div class="big">≣</div>No hay movimientos.<br>Tocá el botón <b style="color:var(--gold)">+</b> para agregar el primero.</div>`;

  const rows = list.length ? list.map(m=>{
    const color = m.tipo==='ingreso'?'var(--ingreso)':'var(--gasto)';
    const sign = m.tipo==='ingreso'?'+':'−';
    const orig = m.moneda==='USD' ? `<span class="orig">${fmtUSD(m.monto)} · TC ${m.tc}</span>` : '';
    const[y,mo,da]=m.fecha.split('-');
    return `<div class="mov" onclick="openForm(${m.id})">
      <div class="stripe" style="background:${color}"></div>
      <div class="info">
        <div class="top"><span class="cat">${m.categoria}</span><span class="amt" style="color:${color}">${sign}${fmtCRC(crc(m))}</span></div>
        <div class="meta"><span>${da}/${mo}/${y}</span>${m.propiedad?`<span>· ${m.propiedad}</span>`:''}${orig?'· '+orig:''}</div>
        ${m.detalle?`<div class="meta" style="color:var(--muted2)">${m.detalle}</div>`:''}
      </div></div>`;
  }).join('') : emptyMsg;

  const sortbar=`<div class="sortbar">
      <div class="res">${resTxt}</div>
      <div class="sortopts">
        <button class="${MSORT==='fecha'?'on':''}" onclick="setMSort('fecha')">Fecha</button>
        <button class="${MSORT==='monto'?'on':''}" onclick="setMSort('monto')">Monto</button>
      </div>
    </div>`;
  const listInner = sortbar + rows;

  if(keepFocus){ document.getElementById('movList').innerHTML=listInner; return; }
  document.getElementById('view').innerHTML=`
    <div class="listfilter">
      <button class="${MFILTER==='todos'?'active':''}" onclick="setMFilter('todos')">Todos<span class="cnt">${cTodos}</span></button>
      <button class="${MFILTER==='ingreso'?'active':''}" onclick="setMFilter('ingreso')">Ingresos<span class="cnt">${cIng}</span></button>
      <button class="${MFILTER==='gasto'?'active':''}" onclick="setMFilter('gasto')">Gastos<span class="cnt">${cGas}</span></button>
    </div>
    <div class="periodbar" style="margin-bottom:12px">
      <div class="lbl" style="display:flex;justify-content:space-between;align-items:center">Buscar por período${(MDESDE||MHASTA)?` · <button onclick="clearMPeriod()" style="background:none;border:none;color:var(--gold);font-size:11px;font-weight:600;letter-spacing:0;text-transform:none;padding:0">Limpiar</button>`:''}</div>
      <div class="rangewrap">
        <div class="field"><span>Desde</span><input type="month" value="${MDESDE}" onchange="setMDesde(this.value)"></div>
        <div class="dash">—</div>
        <div class="field"><span>Hasta</span><input type="month" value="${MHASTA}" onchange="setMHasta(this.value)"></div>
      </div>
    </div>
    <input class="search" placeholder="Buscar por propiedad o detalle…" value="${MSEARCH}" oninput="setMSearch(this.value)">
    <div id="movList">${listInner}</div>`;
}

/* ---------- Formulario ---------- */
let editId=null, fTipo='ingreso', fMon='CRC';
function setTipo(t){fTipo=t; document.querySelectorAll('#segTipo button').forEach(b=>{b.classList.toggle('on',b.dataset.t===t);b.classList.toggle('i',b.dataset.t==='ingreso'&&t==='ingreso');b.classList.toggle('g',b.dataset.t==='gasto'&&t==='gasto');}); fillCats();}
function setMon(m){fMon=m; document.querySelectorAll('#segMon button').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  document.getElementById('lblMonto').textContent = m==='CRC'?'Monto (₡)':'Monto ($)';
  document.getElementById('tcRow').classList.toggle('show',m==='USD');
  if(m==='USD'){ const tc=document.getElementById('fTC'); if(!tc.value) tc.value=SET.tc; updTcHint(); document.getElementById('tcHint').classList.remove('hide'); }
  else document.getElementById('tcHint').classList.add('hide');
}
function fillCats(){const sel=document.getElementById('fCat');sel.innerHTML=CATS[fTipo].map(c=>`<option>${c}</option>`).join('');}
function updTcHint(){const m=parseFloat(document.getElementById('fMonto').value)||0,tc=parseFloat(document.getElementById('fTC').value)||0;document.getElementById('tcHint').textContent= m&&tc?`≈ ${fmtCRC(m*tc)} en colones`:'';}

function openForm(id){
  editId = (typeof id==='number')?id:null;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('delBtn').classList.toggle('hide', editId===null);
  document.getElementById('formTitle').textContent = editId?'Editar movimiento':'Nuevo movimiento';
  if(editId){
    const m=DATA.find(x=>x.id===editId);
    setTipo(m.tipo); fillCats();
    document.getElementById('fCat').value=m.categoria;
    document.getElementById('fFecha').value=m.fecha;
    document.getElementById('fProp').value=m.propiedad||'';
    document.getElementById('fDet').value=m.detalle||'';
    document.getElementById('fMonto').value=m.monto;
    setMon(m.moneda); document.getElementById('fTC').value=m.tc; updTcHint();
  } else {
    setTipo('ingreso'); fillCats(); setMon('CRC');
    document.getElementById('fFecha').value=new Date().toISOString().slice(0,10);
    ['fMonto','fProp','fDet','fTC'].forEach(i=>document.getElementById(i).value='');
  }
  document.getElementById('fMonto').oninput=updTcHint;
  document.getElementById('fTC').oninput=updTcHint;
}
function closeForm(){document.getElementById('overlay').classList.remove('open');}

function saveMov(){
  const monto=parseFloat(document.getElementById('fMonto').value);
  if(!monto||monto<=0){toast('Ingresá un monto válido');return;}
  const tc = fMon==='USD' ? (parseFloat(document.getElementById('fTC').value)||SET.tc) : 1;
  const rec={
    id: editId||Date.now(),
    tipo:fTipo,
    categoria:document.getElementById('fCat').value,
    fecha:document.getElementById('fFecha').value,
    propiedad:document.getElementById('fProp').value.trim(),
    detalle:document.getElementById('fDet').value.trim(),
    moneda:fMon, monto, tc
  };
  if(editId){const i=DATA.findIndex(x=>x.id===editId);DATA[i]=rec;} else DATA.push(rec);
  persist(); closeForm(); render(); toast(editId?'Movimiento actualizado':'Movimiento guardado');
}
function deleteMov(){ if(!editId)return; if(confirm('¿Eliminar este movimiento?')){DATA=DATA.filter(x=>x.id!==editId);persist();closeForm();render();toast('Movimiento eliminado');} }

function fmtMesAno(mk){const[y,m]=mk.split('-');return MES[+m-1]+' '+y;}
function printChartLight(months,ing,gas,sal){
  const W=1000,H=300,pL=12,pR=12,pT=18,pB=32,n=months.length;
  const all=ing.concat(gas).concat(sal).concat([0]);
  let max=Math.max(...all),min=Math.min(...all); if(max===min){max+=1;min-=1;}
  const pad=(max-min)*0.1; max+=pad; min-=pad;
  const X=i=> n<=1?W/2:pL+i*(W-pL-pR)/(n-1);
  const Y=v=> pT+(max-v)/(max-min)*(H-pT-pB);
  const ln=(a,c)=>`<polyline points="${a.map((v,i)=>X(i)+','+Y(v)).join(' ')}" fill="none" stroke="${c}" stroke-width="3"/>`;
  const dots=(a,c)=>a.map((v,i)=>`<circle cx="${X(i)}" cy="${Y(v)}" r="4" fill="${c}"/>`).join('');
  const z=Y(0);
  const zl=(min<0&&max>0)?`<line x1="${pL}" y1="${z}" x2="${W-pR}" y2="${z}" stroke="#bbb" stroke-width="1.5"/>`:'';
  const step=n<=12?1:Math.ceil(n/12);
  const xl=months.map((k,i)=> i%step===0?`<text x="${X(i)}" y="${H-8}" fill="#777" font-size="19" text-anchor="middle">${MES[+k.split('-')[1]-1]}</text>`:'').join('');
  return `<svg viewBox="0 0 ${W} ${H}" class="rep-chart">${zl}${ln(ing,'#388E3C')}${ln(gas,'#EF5350')}${ln(sal,'#1F6FB2')}${dots(sal,'#1F6FB2')}${xl}</svg>`;
}

/* ---------- Exportar / Importar ---------- */
function dl(name,content,type){const b=new Blob([content],{type});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
function exportCSV(){
  const head=['Fecha','Tipo','Categoría','Propiedad','Detalle','Moneda','Monto','Tipo de cambio','Monto en CRC'];
  const rows=DATA.slice().sort((a,b)=>a.fecha.localeCompare(b.fecha)).map(m=>[m.fecha,m.tipo,m.categoria,m.propiedad||'',(m.detalle||'').replace(/\n/g,' '),m.moneda,m.monto,m.tc,Math.round(crc(m))]
    .map(c=>`"${String(c).replace(/"/g,'""')}"`).join(','));
  dl('MH_Ingresos_'+new Date().toISOString().slice(0,10)+'.csv','\uFEFF'+head.join(',')+'\n'+rows.join('\n'),'text/csv;charset=utf-8');
  toast('CSV exportado');
}
function exportJSON(){
  var name='MH_Reportes_respaldo.json';
  var content=JSON.stringify({data:DATA,set:SET},null,2);
  try{ var file=new File([content],name,{type:'application/json'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:'MH Reportes — respaldo'}).then(function(){toast('Respaldo listo');}).catch(function(){}); return;
    } }catch(e){}
  dl(name,content,'application/json'); toast('Respaldo descargado');
}
function importJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const o=JSON.parse(r.result);if(Array.isArray(o.data)){DATA=o.data;if(o.set)SET=o.set;persist();render();toast('Respaldo restaurado');}else toast('Archivo no válido');}catch(_){toast('No se pudo leer el archivo');}};r.readAsText(f);}

function tryUnlock(){var v=document.getElementById('passInput').value;if(v===PASS){document.getElementById('lock').style.display='none';}else{document.getElementById('passErr').style.display='block';var i=document.getElementById('passInput');i.value='';i.focus();}}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeForm();});
go('resumen');
try{document.getElementById('passInput').focus();}catch(e){}
</script>
